<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wetter & Präsentation – Leipzig-Lößnig</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard">

    <!-- LINKE SEITE: Video / Präsentation (16:9) -->
    <div class="presentation-panel">
      <div class="panel-header">
        <span class="panel-icon">🎬</span>
        <span>Präsentation</span>
      </div>
      <div class="video-wrapper">
        <!-- Dein Video hier einfügen: src="deine-praesentation.mp4" -->
        <video id="presentation-video" controls autoplay muted loop>
          <source src="praesentation.mp4" type="video/mp4" />
          <!-- Fallback falls kein Video vorhanden -->
          <div class="video-placeholder">
            <div class="placeholder-icon">🎥</div>
            <p>Video wird geladen…</p>
            <p class="placeholder-hint">Datei <code>praesentation.mp4</code> ins Repository laden</p>
          </div>
        </video>
        <!-- Platzhalter wird angezeigt wenn kein Video geladen -->
        <div class="video-placeholder" id="video-placeholder">
          <div class="placeholder-icon">🎥</div>
          <p class="placeholder-title">Präsentation</p>
          <p class="placeholder-hint">Lade <strong>praesentation.mp4</strong> ins Repository hoch,<br>um das Video hier anzuzeigen.</p>
        </div>
      </div>
      <div class="panel-footer">
        <span id="video-status">Bereit</span>
      </div>
    </div>

    <!-- RECHTE SEITE: Wetterdaten -->
    <div class="weather-panel">
      <div class="panel-header">
        <span class="panel-icon">🌤️</span>
        <span>Wetter Leipzig-Lößnig</span>
      </div>

      <main class="weather-app" aria-live="polite">

        <!-- Aktuelle Temperatur -->
        <section class="current-weather card">
          <div class="temperature-wrap">
            <div class="thermometer" aria-hidden="true">
              <div class="thermometer-bulb"></div>
              <div class="thermometer-fill" id="thermometer-fill"></div>
            </div>
            <div class="temp-info">
              <p class="label">Jetzt</p>
              <p class="temperature" id="current-temp">--°C</p>
              <p class="condition" id="current-condition">Lade Wetterdaten …</p>
            </div>
          </div>
        </section>

        <!-- Kleidungsempfehlung -->
        <section class="clothing card">
          <p class="label">Kleidungsempfehlung</p>
          <p class="clothing-rec">
            <span id="clothing-icon">🧥</span>
            <span id="clothing-text">wird geladen …</span>
          </p>
        </section>

        <!-- 3-Tage-Vorschau -->
        <section class="forecast card">
          <p class="label">3-Tage-Vorschau</p>
          <div class="forecast-grid" id="forecast-grid"></div>
        </section>

        <p class="status" id="status" role="status"></p>
      </main>

      <div class="panel-footer">
        <span id="last-update">Wird aktualisiert …</span>
      </div>
    </div>

  </div>

  <script src="js/app.js"></script>
  <script>
    // Video-Fallback: Placeholder ausblenden wenn Video geladen
    const vid = document.getElementById('presentation-video');
    const placeholder = document.getElementById('video-placeholder');
    if (vid) {
      vid.addEventListener('loadeddata', () => {
        placeholder.style.display = 'none';
      });
      vid.addEventListener('error', () => {
        vid.style.display = 'none';
        placeholder.style.display = 'flex';
      });
    }
  </script>
</body>
</html>
